name: neom_claw
description: >-
  Multi-provider AI coding assistant for Flutter. Supports Gemini, OpenAI, Anthropic,
  DeepSeek, Qwen and Ollama with streaming, tool execution, and MCP client.
version: 0.1.0
homepage: https://github.com/Open-Neom/flutter_claw
repository: https://github.com/Open-Neom/flutter_claw
issue_tracker: https://github.com/Open-Neom/flutter_claw/issues
topics:
  - ai
  - coding-assistant
  - ollama
  - gemini
  - flutter

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Sint framework (S.I.N.T. — State, Injection, Navigation, Translation)
  sint: ^1.3.0

  # HTTP + Streaming
  http: ^1.4.0
  crypto: ^3.0.0

  # Storage
  shared_preferences: ^2.5.0
  flutter_secure_storage: ^9.2.0
  path_provider: ^2.1.0

  # UI
  flutter_markdown: ^0.7.0
  google_fonts: ^6.2.0

  # Utils
  characters: ^1.3.0
  path: ^1.9.0
  uuid: ^4.5.0
  url_launcher: ^6.3.0
  file_picker: ^8.0.0
  image_picker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
