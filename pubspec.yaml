name: neomage
description: Agnostic AI agent engine for Flutter. API clients for AI
  Providers and Ollama with tool execution, skills and MCP.
version: 1.0.0
homepage: https://github.com/Open-Neom/neomage
repository: https://github.com/Open-Neom/neomage
issue_tracker: https://github.com/Open-Neom/neomage/issues
topics:
  - ai
  - agents
  - ollama
  - gemini
  - flutter

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Sint framework (S.I.N.T. — State, Injection, Navigation, Translation)
  sint: ^1.3.0
  sint_sentinel: ^1.1.0
  neom_cli: ^1.0.0
  neom_docs: ^1.0.0

  # Ollama — Local model management
  neom_ollama:
    path: ../neom_modules/ai/neom_ollama

  # HTTP + Streaming
  http: ^1.4.0
  crypto: ^3.0.0

  # Storage
  shared_preferences: ^2.5.0
  path_provider: ^2.1.0

  # UI
  flutter_markdown_plus: ^1.0.1
  google_fonts: ^8.0.2
  url_launcher: ^6.3.0
  file_picker: ^10.3.10
  image_picker: ^1.1.0

  # Persistence
  hive_flutter: ^1.1.0

  # Utils
  characters: ^1.4.0
  path: ^1.9.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # App images
    - assets/neomage_icon.png
    - assets/neomage_logo.png
