name: neomage_example
description: >-
  Example app demonstrating neomage — multi-provider AI chat with tools,
  skills, markdown rendering, and local model support.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Everything comes from neomage (UI, persistence, API clients, skills)
  neomage:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "../assets/neomage_icon.png"
  web:
    generate: true
    image_path: "../assets/neomage_icon.png"
    background_color: "#0a0a0a"
    theme_color: "#6C3FC5"
  windows:
    generate: true
    image_path: "../assets/neomage_icon.png"
    icon_size: 256
  image_path: "../assets/neomage_icon.png"
  adaptive_icon_background: "#0a0a0a"
  adaptive_icon_foreground: "../assets/neomage_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
